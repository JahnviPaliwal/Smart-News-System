<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="applyTheme()">

  <div class="navbar">
    <h2>📰 Smart News AI</h2>

    <div class="navbar-right">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <button class="toggle-btn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </div>
  </div>

  <div class="container">
    <h1>📊 Personalized Dashboard</h1>

    <h2 class="section-title">🔥 Trending News</h2>
    <div id="dashboardTrending" class="grid"></div>

    <h2 class="section-title">🧠 Recommended For You</h2>
    <div id="dashboardRecommend" class="grid"></div>

    <a class="back-link" href="index.html">⬅ Back to Home</a>
  </div>

  <div class="footer">
    Smart News System © 2026 | Recommendations Powered by AI
  </div>

  <!-- FAKE NEWS WARNING MODAL -->
  <div id="fakeNewsModal" class="modal-overlay">
    <div class="modal-box">
      <h2>⚠️ Fake News Alert</h2>
      <p><b id="fakeNewsTitle"></b></p>
      <p>This article is predicted as fake news by the AI system. Please read carefully.</p>
      <button class="modal-btn" onclick="closeFakeNewsPopup()">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    loadDashboard();
  </script>

</body>
</html>
