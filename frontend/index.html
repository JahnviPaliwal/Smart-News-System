<!DOCTYPE html>
<html>
<head>
  <title>Smart News System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="applyTheme()">

  <div class="navbar">
    <h2>📰 Smart News AI</h2>

    <div class="navbar-right">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <button class="toggle-btn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </div>
  </div>

  <div class="container">

    <div class="heading">
      <h1>🔥 Trending News</h1>
    </div>

    <div id="trending" class="grid"></div>

    <h2 class="section-title">📰 Explore All Articles</h2>

    <div class="heading">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search articles..." onkeyup="filterArticles()">
        <select id="categoryFilter" onchange="filterArticles()">
          <option value="All">All Categories</option>
        </select>
      </div>
    </div>

    <div id="articles" class="grid"></div>

  </div>

  <div class="footer">
    Smart News System © 2026 | DBMS + AI + Trending + Recommendation
  </div>

  <!-- FAKE NEWS WARNING MODAL -->
  <div id="fakeNewsModal" class="modal-overlay">
    <div class="modal-box">
      <h2>⚠️ Fake News Alert</h2>
      <p><b id="fakeNewsTitle"></b></p>
      <p>This article is predicted as fake news by the AI system. Please read carefully.</p>
      <button class="modal-btn" onclick="closeFakeNewsPopup()">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    loadTrending();
    loadArticles();
  </script>

</body>
</html>
